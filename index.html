<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Aiswarya's Sing-Along Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0916;
    --bg-soft: #161027;
    --card: #1c1530;
    --card-line: #2c2247;
    --pink: #ff2e9a;
    --cyan: #20e3d2;
    --gold: #ffce54;
    --text: #f3f0fb;
    --text-dim: #a79ecb;
    --radius: 18px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(1200px 600px at 15% -10%, rgba(255,46,154,0.20), transparent 60%),
                radial-gradient(1000px 700px at 110% 10%, rgba(32,227,210,0.16), transparent 55%),
                var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .app-shell { max-width: 820px; margin: 0 auto; padding: 20px 16px calc(28px + var(--safe-b)); }

  header { text-align: center; padding: 10px 0 22px; }
  .eq { display: flex; align-items: flex-end; justify-content: center; gap: 5px; height: 42px; margin: 0 auto 14px; }
  .eq span { width: 6px; border-radius: 4px; background: linear-gradient(180deg, var(--cyan), var(--pink)); animation: bounce 1.1s ease-in-out infinite; }
  .eq span:nth-child(1) { height: 16px; animation-delay: -0.9s; }
  .eq span:nth-child(2) { height: 34px; animation-delay: -0.6s; }
  .eq span:nth-child(3) { height: 22px; animation-delay: -1.1s; }
  .eq span:nth-child(4) { height: 40px; animation-delay: -0.3s; }
  .eq span:nth-child(5) { height: 18px; animation-delay: -0.8s; }
  .eq span:nth-child(6) { height: 30px; animation-delay: -0.15s; }
  .eq span:nth-child(7) { height: 14px; animation-delay: -0.5s; }
  
  @keyframes bounce { 0%, 100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }

  h1 {
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(24px, 6vw, 34px); margin: 0;
    background: linear-gradient(90deg, var(--cyan), var(--pink) 60%, var(--gold));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--text-dim); margin-top: 6px; font-size: clamp(13px, 3.4vw, 15px); }

  .card {
    background: linear-gradient(180deg, var(--card), var(--bg-soft));
    border: 1px solid var(--card-line); border-radius: var(--radius);
    padding: 18px; margin-bottom: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }
  .card h3 { margin: 0 0 12px; font-family: 'Baloo 2', sans-serif; font-size: 15px; color: var(--text-dim); text-transform: uppercase; }

  .upload-row { display: flex; flex-direction: column; gap: 10px; }
  .btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  
  input[type="file"] {
    background: var(--bg-soft); color: var(--text); border: 1.5px dashed var(--card-line);
    border-radius: 12px; padding: 14px; width: 100%;
  }

  button {
    border: none; border-radius: 12px; font-weight: 700; font-size: 15px;
    padding: 14px 16px; min-height: 48px; cursor: pointer; color: #fff;
    transition: transform 0.15s ease, filter 0.15s ease; width: 100%;
  }
  button:active { transform: scale(0.97); }
  button:hover { filter: brightness(1.08); }

  .btn-primary { background: linear-gradient(135deg, var(--pink), #c3116f); box-shadow: 0 8px 20px rgba(255,46,154,0.28); }
  .btn-karaoke { background: linear-gradient(135deg, #2e9bff, #1c6fd6); }
  .btn-action { background: linear-gradient(135deg, #2ed573, #1f9d55); }
  .btn-video { background: linear-gradient(135deg, var(--gold), #e0a300); color: #241a00; }
  button[disabled] { opacity: 0.55; cursor: not-allowed; }

  #status { color: var(--gold); margin-top: 12px; font-size: 13.5px; text-align: center; min-height: 18px; }
  audio#audioPlayer { width: 100%; margin-top: 14px; border-radius: 10px; background: var(--bg-soft); }

  #lyricsContainer {
    margin-top: 4px; font-family: 'Baloo 2', sans-serif; font-size: clamp(18px, 5.2vw, 30px);
    line-height: 1.9; padding: 24px 14px; background: radial-gradient(circle at 50% 0%, #140c26, #060309 75%);
    border-radius: 14px; min-height: 220px; text-align: center; overflow-y: auto; max-height: 400px; scroll-behavior: smooth;
  }
  .lyric-line { display: block; margin-bottom: 10px; color: var(--text); }
  #live-guess { color: var(--pink); opacity: 0.8; font-size: 0.85em; margin-top: 10px; font-style: italic; }

  .action-buttons { display: none; }
  .action-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  progress.convert-bar { width: 100%; height: 10px; border-radius: 6px; margin-top: 10px; accent-color: var(--gold); display: none; }
  
  canvas { display: none; }
  .footer-note { margin-top: 30px; text-align: center; font-family: 'Baloo 2', sans-serif; font-size: 18px; color: var(--pink); font-style: italic; }

  @media (min-width: 640px) {
    .app-shell { padding-top: 34px; }
    .upload-row { flex-direction: row; }
    .btn-row { flex-direction: row; }
    .action-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app-shell">
  <header>
    <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1>Aiswarya's Sing-Along Studio</h1>
    <div class="subtitle">Personalised AI Karaoke Experience 🎤</div>
  </header>

  <div class="card" id="uploadCard">
    <h3>1 · Upload a song</h3>
    <div class="upload-row">
      <input type="file" id="mediaFile" accept="audio/*, video/*">
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="processMedia()">✨ Deep AI Scan (Accurate)</button>
      <button class="btn-karaoke" onclick="startLiveTranscription()">🎙️ Live Speech-to-Text (Fast)</button>
    </div>
    <div id="status">Upload a media file and choose a method</div>
  </div>

  <div class="card">
    <h3>2 · Play &amp; sing</h3>
    <audio id="audioPlayer" controls></audio>
    <div id="lyricsContainer">Your lyrics will appear here...</div>
  </div>

  <div class="card action-buttons" id="actionButtons">
    <h3>3 · Actions</h3>
    <div class="action-grid">
      <button onclick="downloadLyrics()" class="btn-action">⬇️ Save Lyrics</button>
      <button onclick="recordAndDownloadVideo()" id="videoBtn" class="btn-video">🎥 Save as MP4</button>
    </div>
    <progress class="convert-bar" id="convertBar" max="100" value="0"></progress>
  </div>
  <canvas id="videoCanvas" width="720" height="1280"></canvas>
  <div class="footer-note">Dedicated to Aiswarya</div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
  let lyricsData = [];
  let audioContext, sourceNode, destNodeOriginal;
  let audioGraphReady = false;
  let encodedApiKey = "QVEuQWI4Uk42SnFTNDY1TFl2VmFtRXExWkFrSlVJWGM5eEZWQTJPc0xvTU1fUmNWd0ppMFE=";

  const media = document.getElementById("audioPlayer");
  const container = document.getElementById("lyricsContainer");
  const statusText = document.getElementById("status");
  const canvas = document.getElementById("videoCanvas");
  const ctx = canvas.getContext("2d");
  const convertBar = document.getElementById("convertBar");
  const videoBtn = document.getElementById("videoBtn");
  const actionBtns = document.getElementById("actionButtons");

  // -------- SYSTEM: File Loader --------
  document.getElementById("mediaFile").addEventListener("change", function(e) {
    if(e.target.files[0]) media.src = URL.createObjectURL(e.target.files[0]);
  });

  function getApiKey() {
    try { return atob(encodedApiKey); } catch (e) { return null; }
  }
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  // -------- METHOD 1: Gemini Deep AI Analysis (Accurate) --------
  async function processMedia() {
    const fileInput = document.getElementById("mediaFile").files[0];
    const apiKey = getApiKey();
    if (!fileInput) return alert("Please select an audio or video file first.");
    
    stopLiveTranscription(); // Stop live listening if active

    statusText.innerText = "Analyzing media with Gemini... (Please wait)";
    container.innerHTML = "<div class='lyric-line'>Processing...</div>";
    actionBtns.style.display = "none";

    try {
      const base64Media = await fileToBase64(fileInput);
      const requestBody = {
        contents: [{
          parts: [
            { text: "Transcribe the full song lyrics accurately, translated to Malayalam script. Format EXACTLY as a JSON array of strings. Return ONLY JSON." },
            { inlineData: { mimeType: fileInput.type, data: base64Media.split(',')[1] } }
          ]
        }]
      };

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(requestBody)
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      let rawJson = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
      lyricsData = JSON.parse(rawJson);

      container.innerHTML = "";
      lyricsData.forEach(line => {
        let div = document.createElement("div");
        div.className = "lyric-line"; div.innerText = line;
        container.appendChild(div);
      });
      
      actionBtns.style.display = "block";
      statusText.innerText = "Karaoke is ready! Play the song.";
    } catch (error) {
      console.error(error);
      statusText.innerText = "Error: Could not generate lyrics offline.";
      container.innerHTML = "<div class='lyric-line'>Failed to load lyrics.</div>";
    }
  }

  // -------- METHOD 2: Live Speech-to-Text (Fast & Uninterrupted) --------
  let recognition;
  let isLiveListening = false;

  function stopLiveTranscription() {
    if(recognition && isLiveListening) {
      isLiveListening = false;
      recognition.stop();
    }
  }

  function startLiveTranscription() {
    const fileInput = document.getElementById("mediaFile").files[0];
    if (!fileInput) return alert("Please select an audio file first.");

    if (!('webkitSpeechRecognition' in window)) {
      statusText.innerText = "Sorry, your browser doesn't support live Speech-to-Text."; return;
    }

    stopLiveTranscription();
    lyricsData = []; // Clear array to capture new live lyrics for Video export
    container.innerHTML = "";
    actionBtns.style.display = "block";

    recognition = new webkitSpeechRecognition();
    recognition.continuous = true; 
    recognition.interimResults = true; 
    recognition.lang = 'ml-IN'; 

    recognition.onstart = function() {
      isLiveListening = true;
      statusText.innerText = "🎙️ Listening live... Play the song out loud!";
      if(container.innerHTML === "") container.innerHTML = "<div class='lyric-line' style='color: var(--text-dim);' id='waitingMsg'>Waiting for voice...</div>";
      if(media.paused) media.play();
    };

    recognition.onresult = function(event) {
      let finalTranscript = '';
      let interimTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          let text = event.results[i][0].transcript;
          finalTranscript += text + '<br>';
          lyricsData.push(text); // Save to array for Video Export
        } else {
          interimTranscript += event.results[i][0].transcript;
        }
      }

      if (finalTranscript !== '') {
          let waiting = document.getElementById('waitingMsg');
          if(waiting) waiting.remove();
          
          let newDiv = document.createElement("div");
          newDiv.className = "lyric-line";
          newDiv.innerHTML = finalTranscript;
          container.insertBefore(newDiv, document.getElementById("live-guess"));
          container.scrollTop = container.scrollHeight;
      }
      
      let liveSpan = document.getElementById("live-guess");
      if(!liveSpan) {
          container.innerHTML += `<div id="live-guess"></div>`;
          liveSpan = document.getElementById("live-guess");
      }
      liveSpan.innerText = interimTranscript;
    };

    recognition.onerror = function(event) {
      if(event.error !== 'no-speech') console.error("Speech API Error: ", event.error);
    };

    // Auto-Restart logic to prevent interruptions
    recognition.onend = function() {
      if (isLiveListening && !media.paused && !media.ended) {
          try { recognition.start(); } catch(e) {} 
      } else {
          isLiveListening = false;
          statusText.innerText = "Live transcription ended.";
          let liveSpan = document.getElementById("live-guess");
          if(liveSpan) liveSpan.innerText = "";
      }
    };

    try { recognition.start(); } catch(e) { console.error(e); }
  }

  // Monitor audio play state to manage auto-restart logic safely
  media.addEventListener('pause', () => { if(isLiveListening) { isLiveListening = false; recognition.stop(); } });
  media.addEventListener('ended', () => { if(isLiveListening) { isLiveListening = false; recognition.stop(); } });
  media.addEventListener('play', () => { 
    if(document.getElementById("live-guess") && !isLiveListening) { 
        isLiveListening = true; 
        try { recognition.start(); } catch(e){} 
    }
  });

  // -------- SYSTEM: Audio & Video Export Functions --------
  function setupAudioGraph() {
    if (audioGraphReady) return;
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioContext.createMediaElementSource(media);
    destNodeOriginal = audioContext.createMediaStreamDestination();
    sourceNode.connect(destNodeOriginal);
    sourceNode.connect(audioContext.destination);
    audioGraphReady = true;
  }

  function downloadLyrics() {
    if(lyricsData.length === 0) return alert("No lyrics to save yet!");
    let textContent = "Malayalam Lyrics\n\n" + lyricsData.join("\n");
    const blob = new Blob([textContent], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Malayalam_Lyrics.txt";
    link.click();
  }

  let ffmpegInstance = null;
  async function getFFmpeg() {
    if (ffmpegInstance) return ffmpegInstance;
    const { createFFmpeg } = FFmpeg;
    ffmpegInstance = createFFmpeg({
      log: false, corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
      progress: ({ ratio }) => {
        if (ratio >= 0 && ratio <= 1) {
          convertBar.value = Math.round(ratio * 100);
          statusText.innerText = `Converting to MP4... ${Math.round(ratio * 100)}%`;
        }
      }
    });
    await ffmpegInstance.load();
    return ffmpegInstance;
  }

  function pickRecorderMimeType() {
    const candidates = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
    for (const type of candidates) { if (MediaRecorder.isTypeSupported(type)) return type; }
    return '';
  }

  function recordAndDownloadVideo() {
    if(lyricsData.length === 0) return alert("Please generate or live-transcribe lyrics first.");
    setupAudioGraph();
    videoBtn.disabled = true;
    convertBar.style.display = 'block'; convertBar.value = 0;
    statusText.innerText = "Recording video... please wait until the song finishes.";
    
    media.currentTime = 0; media.play();
    if (audioContext.state === 'suspended') audioContext.resume();

    const videoStream = canvas.captureStream(30);
    const audioStream = destNodeOriginal.stream;
    const combinedStream = new MediaStream([...videoStream.getTracks(), ...audioStream.getTracks()]);
    const mimeType = pickRecorderMimeType();
    const recorder = new MediaRecorder(combinedStream, mimeType ? { mimeType } : undefined);
    const chunks = [];

    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = async () => {
      const webmBlob = new Blob(chunks, { type: 'video/webm' });
      try {
        statusText.innerText = "Loading MP4 converter...";
        const { fetchFile } = FFmpeg;
        const ffmpeg = await getFFmpeg();
        ffmpeg.FS('writeFile', 'input.webm', await fetchFile(webmBlob));
        statusText.innerText = "Converting to MP4... 0%";
        await ffmpeg.run('-i', 'input.webm', '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23', '-c:a', 'aac', '-pix_fmt', 'yuv420p', 'output.mp4');
        const data = ffmpeg.FS('readFile', 'output.mp4');
        const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(mp4Blob); link.download = "Karaoke_Video.mp4"; link.click();
        statusText.innerText = "MP4 downloaded successfully! 🎉";
      } catch (err) {
        console.error(err);
        const link = document.createElement("a"); link.href = URL.createObjectURL(webmBlob); link.download = "Karaoke_Video.webm"; link.click();
        statusText.innerText = "MP4 conversion failed — downloaded as WebM instead.";
      } finally {
        videoBtn.disabled = false; convertBar.style.display = 'none'; convertBar.value = 0;
      }
    };

    recorder.start();

    const maxWidth = canvas.width - 80;
    const lineHeight = 58;
    ctx.font = "bold 40px 'Baloo 2', Arial";
    let fullRows = [];
    lyricsData.forEach(lineText => {
      let words = lineText.split(" "); let row = "";
      words.forEach(w => {
        let test = row ? row + " " + w : w;
        if (ctx.measureText(test).width > maxWidth && row) { fullRows.push(row); row = w; } 
        else { row = test; }
      });
      if (row) fullRows.push(row);
    });
    
    const blockHeight = fullRows.length * lineHeight;
    const scrollDistance = Math.max(0, blockHeight - canvas.height + 260);

    function drawFrame() {
      if (media.paused || media.ended) return;
      ctx.fillStyle = "#0d0916"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      const grad = ctx.createRadialGradient(canvas.width/2, canvas.height*0.35, 50, canvas.width/2, canvas.height*0.35, canvas.width*0.7);
      grad.addColorStop(0, "rgba(255,46,154,0.18)"); grad.addColorStop(1, "rgba(13,9,22,0)");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.shadowBlur = 0;

      const progress = media.duration ? Math.min(1, media.currentTime / media.duration) : 0;
      const offsetY = scrollDistance * progress;
      ctx.font = "bold 40px 'Baloo 2', Arial"; ctx.fillStyle = "#f3f0fb";
      
      fullRows.forEach((row, i) => {
        const y = 130 + i * lineHeight - offsetY;
        if (y > -lineHeight && y < canvas.height + lineHeight) ctx.fillText(row, canvas.width / 2, y);
      });

      ctx.font = "italic 26px 'Baloo 2', Arial"; ctx.fillStyle = "#ff2e9a";
      ctx.fillText("Dedicated to Aiswarya", canvas.width / 2, canvas.height - 50);
      requestAnimationFrame(drawFrame);
    }
    drawFrame();
    media.onended = () => { recorder.stop(); media.onended = null; };
  }
</script>
</body>
</html>
