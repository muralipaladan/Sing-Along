<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malayalam Karaoke AI | Gemini 3.5 Flash</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input, button {
            padding: 12px;
            margin: 10px 5px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }
        input[type="password"] {
            width: 80%;
            background: #333;
            color: white;
            border: 1px solid #555;
        }
        input[type="file"] {
            background: #333;
            color: white;
            cursor: pointer;
        }
        button {
            background-color: #ff3b30;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #cc2f26; }
        
        #audioPlayer {
            width: 100%;
            margin-top: 20px;
        }
        #lyricsContainer {
            margin-top: 40px;
            font-size: 32px;
            line-height: 1.8;
            padding: 20px;
            background: #000;
            border-radius: 10px;
            min-height: 200px;
        }
        .lyric-word {
            margin: 0 6px;
            color: #666;
            transition: color 0.1s;
        }
        /* Malayalam Text Highlight Color */
        .highlight {
            color: #ff3b30;
            text-shadow: 0 0 12px rgba(255, 59, 48, 0.6);
            font-weight: bold;
        }
        #status { color: #ffcc00; margin-top: 10px; font-style: italic; }
        
        /* Smooth fade out for API section */
        #apiSection {
            transition: opacity 0.5s ease, height 0.5s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 AI Malayalam Karaoke (Gemini 3.5 Flash)</h2>
    
    <!-- API Key Section (Will hide after first use) -->
    <div id="apiSection">
        <input type="password" id="apiKey" placeholder="Enter your Gemini 3.5 Flash API Key here...">
        <br>
    </div>
    
    <!-- Audio File Input -->
    <div id="uploadSection">
        <input type="file" id="audioFile" accept="audio/*">
        <button onclick="processAudio()">Generate Lyrics</button>
        <button onclick="toggleKaraoke()" id="karaokeBtn">Turn ON Karaoke Mode</button>
    </div>

    <div id="status"></div>

    <audio id="audioPlayer" controls></audio>

    <div id="lyricsContainer">Upload a song and click Generate Lyrics.</div>
</div>

<script>
    let lyricsData = [];
    let isKaraokeMode = false;
    let audioContext;
    let sourceNode;
    let karaokeNode;
    const audio = document.getElementById("audioPlayer");
    const container = document.getElementById("lyricsContainer");
    const statusText = document.getElementById("status");
    let storedApiKey = ""; // Store API key in memory after hiding input

    async function processAudio() {
        const apiKeyInput = document.getElementById("apiKey").value.trim();
        const fileInput = document.getElementById("audioFile").files[0];

        // Set API key if entered, or use previously stored one
        if (apiKeyInput) {
            storedApiKey = apiKeyInput;
        }

        if (!storedApiKey) return alert("Please enter your Gemini API Key.");
        if (!fileInput) return alert("Please select an audio file.");

        // Hide API Section once key is confirmed
        document.getElementById("apiSection").style.display = "none";
        
        statusText.innerText = "Analyzing audio with Gemini 3.5 Flash... (This may take a minute)";
        
        // Load audio to player
        const objectUrl = URL.createObjectURL(fileInput);
        audio.src = objectUrl;

        try {
            const base64Audio = await fileToBase64(fileInput);
            const mimeType = fileInput.type;

            const prompt = `Listen to this song. Transcribe the lyrics and translate them to Malayalam. 
            Format EXACTLY as a JSON array. 
            Each object must have "time" (start time in seconds as float) and "word" (the Malayalam word).
            Example: [{"time": 0.5, "word": "ഇത്"}, {"time": 1.2, "word": "ഒരു"}]
            Return ONLY the raw JSON array. No markdown, no backticks.`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: mimeType, data: base64Audio.split(',')[1] } }
                    ]
                }]
            };

            // Using Gemini 3.5 Flash endpoint as requested
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${storedApiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            
            if(data.error) throw new Error(data.error.message);

            let rawJson = data.candidates[0].content.parts[0].text;
            rawJson = rawJson.replace(/```json/g, '').replace(/```/g, '').trim();
            
            lyricsData = JSON.parse(rawJson);
            renderLyrics();
            statusText.innerText = "Lyrics generated successfully! Hit Play.";

        } catch (error) {
            console.error(error);
            statusText.innerText = "Error generating lyrics. Please check your API Key or try a smaller file.";
            // Show API section again if there's an error so user can correct it
            document.getElementById("apiSection").style.display = "block";
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function renderLyrics() {
        container.innerHTML = "";
        lyricsData.forEach((item, index) => {
            let span = document.createElement("span");
            span.className = "lyric-word";
            span.id = "word-" + index;
            span.innerText = item.word;
            container.appendChild(span);
        });
    }

    audio.addEventListener("timeupdate", () => {
        let currentTime = audio.currentTime;
        lyricsData.forEach((item, index) => {
            let span = document.getElementById("word-" + index);
            if (span) {
                if (currentTime >= item.time) {
                    span.classList.add("highlight");
                } else {
                    span.classList.remove("highlight");
                }
            }
        });
    });

    function toggleKaraoke() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioContext.createMediaElementSource(audio);
            
            karaokeNode = audioContext.createGain();
            
            const splitter = audioContext.createChannelSplitter(2);
            sourceNode.connect(splitter);
            
            const gainNode = audioContext.createGain();
            gainNode.gain.value = -1;
            splitter.connect(gainNode, 1);
            
            const merger = audioContext.createChannelMerger(1);
            splitter.connect(merger, 0, 0);
            gainNode.connect(merger, 0, 0);
            
            merger.connect(karaokeNode);
            karaokeNode.connect(audioContext.destination);
        }

        isKaraokeMode = !isKaraokeMode;
        const btn = document.getElementById("karaokeBtn");
        
        if (isKaraokeMode) {
            sourceNode.disconnect();
            sourceNode.connect(karaokeNode);
            btn.innerText = "Turn OFF Karaoke Mode";
            btn.style.backgroundColor = "#4caf50";
        } else {
            sourceNode.disconnect();
            sourceNode.connect(audioContext.destination);
            btn.innerText = "Turn ON Karaoke Mode";
            btn.style.backgroundColor = "#ff3b30";
        }
        
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
</script>

</body>
</html>
