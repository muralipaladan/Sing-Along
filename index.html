<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Malayalam Sing-Along Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .api-link {
            display: block;
            margin-bottom: 15px;
            color: #4caf50;
            text-decoration: none;
            font-size: 14px;
        }
        .api-link:hover { text-decoration: underline; }
        
        input, button {
            padding: 12px;
            margin: 8px 5px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }
        input[type="password"] { width: 70%; background: #333; color: white; border: 1px solid #555; }
        input[type="file"] { background: #333; color: white; cursor: pointer; }
        
        button { background-color: #007bff; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .btn-danger { background-color: #ff3b30; }
        .btn-danger:hover { background-color: #cc2f26; }
        .btn-success { background-color: #28a745; }
        
        #audioPlayer { width: 100%; margin-top: 20px; }
        
        #lyricsContainer {
            margin-top: 30px;
            font-size: 28px;
            line-height: 2;
            padding: 20px;
            background: #000;
            border-radius: 10px;
            min-height: 200px;
            text-align: center;
        }
        .lyric-line { display: block; margin-bottom: 10px; }
        .lyric-word { margin: 0 5px; color: #666; transition: color 0.1s; }
        
        /* Highlight Color */
        .highlight { color: #ff3b30; text-shadow: 0 0 12px rgba(255, 59, 48, 0.6); font-weight: bold; }
        
        #status { color: #ffcc00; margin-top: 10px; font-style: italic; }
        .action-buttons { margin-top: 20px; display: none; padding: 15px; background: #2a2a2a; border-radius: 8px;}
        
        /* Hidden Canvas for Video Recording */
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 AI Sing-Along Studio (Gemini 3.5 Flash)</h2>
    
    <div id="apiSection">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="api-link">🔑 Click here to get your Free Gemini API Key</a>
        <input type="password" id="apiKey" placeholder="Paste your API Key here...">
        <br>
    </div>
    
    <div id="uploadSection">
        <input type="file" id="mediaFile" accept="audio/mp3, audio/wav, video/mp4, audio/*, video/*">
        <button onclick="processMedia()">Generate Lyrics</button>
    </div>

    <div id="status"></div>
    <audio id="audioPlayer" controls></audio>

    <div class="action-buttons" id="actionButtons">
        <button onclick="downloadLyrics()" class="btn-success">⬇️ Save Lyrics</button>
        <button onclick="recordAndDownloadVideo()" class="btn-success">🎥 Save as Video (Lyrics Synced)</button>
    </div>

    <div id="lyricsContainer">Lyrics will appear here line by line...</div>
    
    <!-- Video Rendering Canvas -->
    <canvas id="videoCanvas" width="720" height="1280"></canvas>
</div>

<script>
    let lyricsData = [];
    let audioContext, sourceNode, destNode;
    let audioGraphReady = false;
    let storedApiKey = "";
    const media = document.getElementById("audioPlayer");
    const container = document.getElementById("lyricsContainer");
    const statusText = document.getElementById("status");
    const canvas = document.getElementById("videoCanvas");
    const ctx = canvas.getContext("2d");

    // 1. Process Media via Gemini API
    async function processMedia() {
        const apiKeyInput = document.getElementById("apiKey").value.trim();
        const fileInput = document.getElementById("mediaFile").files[0];

        if (apiKeyInput) storedApiKey = apiKeyInput;
        if (!storedApiKey) return alert("API Key is required.");
        if (!fileInput) return alert("Please select an MP3 or MP4 file.");

        document.getElementById("apiSection").style.display = "none";
        statusText.innerText = "Analyzing media with Gemini 3.5 Flash... (Please wait)";
        
        media.src = URL.createObjectURL(fileInput);

        try {
            const base64Media = await fileToBase64(fileInput);
            
            // Structured Prompt for Line-by-Line output
            const prompt = `Listen to this media. Transcribe the lyrics and translate them to Malayalam.
            Organize the lyrics line by line.
            Format EXACTLY as a JSON array of line objects.
            Each object must have a "words" array.
            Each word object inside the array must have "time" (start time in seconds as float) and "word" (Malayalam word).
            Example: 
            [ { "words": [ {"time": 0.5, "word": "ഇത്"}, {"time": 1.2, "word": "ഒരു"} ] } ]
            Return ONLY JSON array.`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: fileInput.type, data: base64Media.split(',')[1] } }
                    ]
                }]
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${storedApiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);

            let rawJson = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
            lyricsData = JSON.parse(rawJson);
            
            renderLyrics();
            document.getElementById("actionButtons").style.display = "block";
            statusText.innerText = "Done! Play the song to see the sync.";

        } catch (error) {
            console.error(error);
            statusText.innerText = "Error generated. Check API Key or file size.";
            document.getElementById("apiSection").style.display = "block";
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // 2. Render Lyrics Line by Line
    function renderLyrics() {
        container.innerHTML = "";
        lyricsData.forEach((lineObj, lineIndex) => {
            let lineDiv = document.createElement("div");
            lineDiv.className = "lyric-line";
            
            lineObj.words.forEach((wordObj, wordIndex) => {
                let span = document.createElement("span");
                span.className = "lyric-word";
                span.id = `word-${lineIndex}-${wordIndex}`;
                span.dataset.time = wordObj.time;
                span.innerText = wordObj.word;
                lineDiv.appendChild(span);
            });
            container.appendChild(lineDiv);
        });
    }

    // 3. Highlight Logic
    media.addEventListener("timeupdate", () => {
        let currentTime = media.currentTime;
        document.querySelectorAll('.lyric-word').forEach(span => {
            if (currentTime >= parseFloat(span.dataset.time)) {
                span.classList.add("highlight");
            } else {
                span.classList.remove("highlight");
            }
        });
    });

    // 4. Audio graph — taps the original, unmodified song for recording.
    // Song is never altered or muted.
    function setupAudioGraph() {
        if (audioGraphReady) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        sourceNode = audioContext.createMediaElementSource(media);

        destNode = audioContext.createMediaStreamDestination();
        sourceNode.connect(destNode);
        sourceNode.connect(audioContext.destination);

        audioGraphReady = true;
    }

    // 5. Download Lyrics (.txt file)
    function downloadLyrics() {
        let textContent = "";
        lyricsData.forEach(line => {
            line.words.forEach(w => textContent += w.word + " ");
            textContent += "\n";
        });
        const blob = new Blob([textContent], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Malayalam_Lyrics.txt";
        link.click();
    }

    // 6. Record and Save as Video (Canvas + Audio)
    function recordAndDownloadVideo() {
        setupAudioGraph();

        statusText.innerText = "Recording Video... Please wait until the song finishes playing.";
        media.currentTime = 0;
        media.play();
        if (audioContext.state === 'suspended') audioContext.resume();

        const videoStream = canvas.captureStream(30);
        // Song is never altered — recorded video always carries the original audio
        const audioStream = destNode.stream;
        const combinedStream = new MediaStream([...videoStream.getTracks(), ...audioStream.getTracks()]);
        
        const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
        const chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "SingAlong_Video.webm";
            link.click();
            statusText.innerText = "Video Downloaded Successfully!";
        };

        recorder.start();

        // Canvas Drawing Loop — one line at a time, synced exactly to song time
        function drawFrame() {
            if (media.paused || media.ended) return;
            
            ctx.fillStyle = "#121212";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            let currentTime = media.currentTime;
            const maxWidth = canvas.width - 80;
            const midY = canvas.height / 2;

            // find the line active right now (no delay: uses live media.currentTime)
            let activeIdx = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                let start = lyricsData[i].words[0].time;
                let nextStart = (i + 1 < lyricsData.length) ? lyricsData[i + 1].words[0].time : Infinity;
                if (currentTime >= start && currentTime < nextStart) { activeIdx = i; break; }
            }

            // previous line, small & dim, for context
            if (activeIdx > 0) {
                ctx.font = "26px Arial";
                ctx.fillStyle = "#4a4a4a";
                let prevText = lyricsData[activeIdx - 1].words.map(w => w.word).join(" ");
                ctx.fillText(prevText, canvas.width / 2, midY - 160);
            }

            if (activeIdx >= 0) {
                const words = lyricsData[activeIdx].words;
                ctx.font = "bold 44px Arial";

                // greedy word-wrap so long lines fit the portrait width
                let rows = [[]];
                let rowWidth = 0;
                words.forEach(w => {
                    let ww = ctx.measureText(w.word + " ").width;
                    if (rowWidth + ww > maxWidth && rows[rows.length - 1].length > 0) {
                        rows.push([]);
                        rowWidth = 0;
                    }
                    rows[rows.length - 1].push({ w, ww });
                    rowWidth += ww;
                });

                let startY = midY - (rows.length - 1) * 30;
                rows.forEach((row, rIdx) => {
                    let rowTotal = row.reduce((a, r) => a + r.ww, 0);
                    let x = canvas.width / 2 - rowTotal / 2;
                    let y = startY + rIdx * 60;
                    row.forEach(({ w, ww }) => {
                        let wx = x + ww / 2;
                        ctx.fillStyle = currentTime >= w.time ? "#ff3b30" : "#666666";
                        ctx.fillText(w.word, wx, y);
                        x += ww;
                    });
                });
            }

            if (activeIdx + 1 < lyricsData.length) {
                ctx.font = "26px Arial";
                ctx.fillStyle = "#888888";
                let nextText = lyricsData[activeIdx + 1].words.map(w => w.word).join(" ");
                ctx.fillText(nextText, canvas.width / 2, midY + 160);
            }
            
            requestAnimationFrame(drawFrame);
        }
        
        drawFrame();
        
        media.onended = () => {
            recorder.stop();
            media.onended = null;
        };
    }
</script>

</body>
</html>
