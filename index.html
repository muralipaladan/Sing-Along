<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Karaoke AI</title>
<!-- മനോഹരമായ മലയാളം ഫോണ്ട് -->
<link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --primary: #38BDF8;
    --text: #F8FAFC;
    --text-muted: #94A3B8;
    --radius: 16px;
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 500px; }
  .card {
    background: var(--surface);
    padding: 24px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
  }
  h1 { font-size: 22px; color: var(--primary); text-align: center; margin-top: 0; }
  
  input[type="password"], input[type="file"], input[type="text"], select, textarea {
    width: 100%; padding: 14px; background: #0F172A; border: 1px solid #334155;
    color: white; border-radius: 10px; margin-top: 8px; box-sizing: border-box;
    font-family: inherit;
  }
  
  textarea { resize: vertical; min-height: 100px; }

  button {
    width: 100%; padding: 14px; background: var(--primary); color: #000;
    font-weight: bold; font-size: 16px; border: none; border-radius: 10px;
    margin-top: 16px; cursor: pointer; transition: 0.2s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { background: #334155; color: #94A3B8; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

  #apiSection { display: none; margin-bottom: 20px; }
  .api-link { font-size: 13px; color: var(--primary); float: right; margin-top: 4px; text-decoration: none; }

  .progress-container { display: none; margin-top: 16px; text-align: center; }
  .progress-bar-bg { background: #334155; border-radius: 8px; height: 10px; width: 100%; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s; }
  .progress-text { font-size: 14px; color: var(--primary); font-weight: bold; margin-top: 8px;}

  .song-list { list-style: none; padding: 0; margin: 0; }
  .song-item {
    background: #0F172A; padding: 16px; border-radius: 10px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155;
    flex-wrap: wrap; gap: 10px;
  }
  .song-title { font-weight: bold; font-size: 15px; width: 100%; }
  .song-actions { display: flex; gap: 5px; width: 100%; justify-content: flex-end; flex-wrap: wrap; }
  .song-actions button { width: auto; padding: 8px 12px; margin: 0; font-size: 13px; flex: 1; min-width: 60px; }

  /* Player View Updates */
  #playerHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
  #playerHeader button { width: auto; padding: 8px 12px; margin: 0; font-size: 13px; }
  
  audio { width: 100%; margin-top: 16px; border-radius: 8px; }
  
  /* ലൈൻ-ബൈ-ലൈൻ കരോക്കെ ഡിസൈൻ */
  .karaoke-container {
    background: linear-gradient(145deg, #0f172a, #000000);
    height: 400px; overflow-y: auto; border-radius: 12px;
    padding: 30px 20px; text-align: center; margin-top: 16px; 
    border: 1px solid #334155; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    position: relative; scroll-behavior: smooth;
    font-family: 'Anek Malayalam', sans-serif;
  }
  
  .lyric-line {
    font-size: 20px; color: #555; transition: all 0.3s ease; 
    margin: 15px 0; line-height: 1.6;
  }
  .lyric-line.active { 
    color: #F8FAFC; font-size: 26px; font-weight: 800; 
    transform: scale(1.05); text-shadow: 0px 0px 15px rgba(56, 189, 248, 0.8); 
  }
  .lyric-line.passed { color: var(--primary); opacity: 0.7; font-weight: 600; }
  
  #playerView:fullscreen { background: #000; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
  #playerView:fullscreen .card { box-shadow: none; border-radius: 0; background: transparent; height: 100%; display: flex; flex-direction: column;}
  #playerView:fullscreen .karaoke-container { height: 100%; border: none; flex-grow: 1;}
  #playerView:fullscreen .lyric-line { font-size: 24px; margin: 25px 0;}
  #playerView:fullscreen .lyric-line.active { font-size: 34px; }
  #playerView:fullscreen #playerHeader button { background: #334155; color: white; border: none; }
  
  .view { display: none; }
  .view.active { display: block; }
  
  #draftFileInfo {
    display: none; font-size: 13px; color: #10B981; margin-top: 8px; 
    padding: 10px; background: #064E3B; border-radius: 8px; border: 1px solid #047857;
  }
</style>
</head>
<body>

<div class="container">
  
  <div id="libraryView" class="view active">
    <div id="apiSection" class="card">
      <h2 style="font-size: 16px; margin:0 0 10px 0;">⚙️ Setup API Key & Model</h2>
      <label style="font-size: 13px; color: var(--text-muted);">AI Model</label>
      <select id="modelSelect">
        <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
      </select>
      <label style="font-size: 13px; color: var(--text-muted); margin-top: 12px; display: block;">Gemini API Key</label>
      <a href="https://aistudio.google.com/apikey" target="_blank" class="api-link">🔑 Get Free API Key</a>
      <input type="password" id="apiKey" placeholder="AIzaSy...">
      <button id="saveApiBtn">Save Settings</button>
    </div>

    <div class="card">
      <h1>🎵 പാട്ടുകളുടെ ശേഖരം</h1>
      <ul class="song-list" id="savedSongsList"></ul>
      <button id="showAddViewBtn" style="margin-top: 20px;">+ പുതിയ പാട്ട് ചേർക്കുക</button>
      <button id="resetApiBtn" class="btn-outline" style="margin-top: 10px; font-size: 12px;">Change API Key / Model</button>
    </div>
  </div>

  <div id="addView" class="view">
    <div class="card">
      <h1>പുതിയ പാട്ട് ചേർക്കുക</h1>
      
      <label style="font-size: 13px; color: var(--text-muted); display: block; margin-top: 16px;">MP3 / MP4 ഫയൽ തിരഞ്ഞെടുക്കുക</label>
      <input type="file" id="mediaFile" accept="audio/*, video/mp4">
      <div id="draftFileInfo"></div>
      
      <label style="font-size: 13px; color: var(--text-muted); margin-top: 16px; display: block;">പാട്ടിന്റെ പേര്</label>
      <input type="text" id="songTitleInput" placeholder="ഉദാ: മാണിക്യ മലരായ...">
      
      <button type="button" onclick="searchLyrics()" class="btn-outline" style="margin-top: 8px; padding: 10px; font-size: 14px;">🔍 വരികൾ തിരയുക (Google)</button>
      
      <label style="font-size: 13px; color: var(--text-muted); display: block; margin-top: 16px;">വരികൾ പേസ്റ്റ് ചെയ്യുക (ഇവ പാട്ടുമായി സിങ്ക് ആകുന്നതാണ്)</label>
      <textarea id="customLyrics" placeholder="കോപ്പി ചെയ്ത വരികൾ ഇവിടെ പേസ്റ്റ് ചെയ്യുക..."></textarea>
      
      <button id="processBtn">ടൈംലൈൻ കണ്ടെത്തി സേവ് ചെയ്യുക</button>
      <button class="btn-outline" id="backToLibraryBtn">ക്യാൻസൽ</button>
      
      <div class="progress-container" id="progressBox">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
        <div class="progress-text" id="progressText">0%</div>
        <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;" id="progressStatus">പ്രോസസ്സ് ചെയ്യുന്നു...</div>
      </div>
    </div>
  </div>

  <div id="playerView" class="view">
    <div class="card">
      <div id="playerHeader">
        <button class="btn-outline" id="playerBackBtn">🔙 പുറകോട്ട്</button>
        <button class="btn-outline" id="fullscreenBtn" onclick="toggleFullScreen()">🔲 Full Screen</button>
      </div>
      <h1 id="playerTitle">പാട്ട്</h1>
      <audio id="audioPlayer" controls></audio>
      <div class="karaoke-container" id="lyricsBox"></div>
    </div>
  </div>

</div>

<script>
  const DB_NAME = 'ProKaraokeDB';
  let db;
  let pendingFile = null;

  function initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => {
        let db = e.target.result;
        if (!db.objectStoreNames.contains('songs')) {
          db.createObjectStore('songs', { keyPath: 'id' });
        }
      };
      request.onsuccess = (e) => { db = e.target.result; resolve(db); };
      request.onerror = (e) => reject(e);
    });
  }

  function saveSongToDB(song) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('songs', 'readwrite');
      tx.objectStore('songs').put(song);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e);
    });
  }

  function getAllSongsFromDB() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('songs', 'readonly');
      const request = tx.objectStore('songs').getAll();
      request.onsuccess = () => resolve(request.result);
      request.onerror = (e) => reject(e);
    });
  }

  function getSongFromDB(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('songs', 'readonly');
      const request = tx.objectStore('songs').get(id);
      request.onsuccess = () => resolve(request.result);
      request.onerror = (e) => reject(e);
    });
  }

  function deleteSongFromDB(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('songs', 'readwrite');
      tx.objectStore('songs').delete(id);
      tx.oncomplete = () => resolve();
    });
  }

  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
  }

  function toggleFullScreen() {
    const playerView = document.getElementById('playerView');
    if (!document.fullscreenElement) {
        if (playerView.requestFullscreen) { playerView.requestFullscreen(); } 
        else if (playerView.webkitRequestFullscreen) { playerView.webkitRequestFullscreen(); } 
    } else {
        if (document.exitFullscreen) { document.exitFullscreen(); } 
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } 
    }
  }

  async function saveDraft() {
    const title = document.getElementById('songTitleInput').value.trim();
    const lyrics = document.getElementById('customLyrics').value.trim();
    if(!pendingFile && !title && !lyrics) return;
    
    const draftData = { id: 'DRAFT', title: title, audioBlob: pendingFile, fileName: pendingFile ? (pendingFile.name || 'Audio') : '', customLyrics: lyrics };
    await saveSongToDB(draftData);
  }

  document.getElementById('mediaFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(file) {
        pendingFile = file;
        document.getElementById('draftFileInfo').innerText = "✔️ തിരഞ്ഞെടുത്ത ഫയൽ: " + file.name;
        document.getElementById('draftFileInfo').style.display = 'block';
        const titleInput = document.getElementById('songTitleInput');
        if(!titleInput.value) { titleInput.value = file.name.replace(/\.[^/.]+$/, ""); }
        await saveDraft();
    }
  });

  document.getElementById('songTitleInput').addEventListener('input', saveDraft);
  document.getElementById('customLyrics').addEventListener('input', saveDraft);

  function searchLyrics() {
    let title = document.getElementById('songTitleInput').value.trim();
    if(!title) { title = "malayalam movie song"; }
    const query = encodeURIComponent(title + " lyrics malayalam");
    window.open("https://www.google.com/search?q=" + query, "_blank");
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await initDB();
    try {
        const draft = await getSongFromDB('DRAFT');
        if (draft && (draft.title || draft.audioBlob || draft.customLyrics)) {
            if (draft.title) document.getElementById('songTitleInput').value = draft.title;
            if (draft.customLyrics) document.getElementById('customLyrics').value = draft.customLyrics;
            if (draft.audioBlob) {
                pendingFile = draft.audioBlob;
                document.getElementById('draftFileInfo').innerText = "✔️ നേരത്തെ തിരഞ്ഞെടുത്ത ഫയൽ: " + draft.fileName;
                document.getElementById('draftFileInfo').style.display = 'block';
            }
            showView('addView');
        } else { loadLibrary(); }
    } catch(e) { loadLibrary(); }

    const savedKey = localStorage.getItem('gemini_karaoke_key');
    const savedModel = localStorage.getItem('gemini_karaoke_model');
    if(savedModel) { document.getElementById('modelSelect').value = savedModel; }
    if(savedKey) {
      document.getElementById('apiKey').value = savedKey;
      document.getElementById('apiSection').style.display = 'none';
    } else { document.getElementById('apiSection').style.display = 'block'; }

    window.addEventListener('message', async (e) => {
      if (e.data && e.data.type === 'IMPORT_SONG') {
        try {
          const songData = e.data.data;
          const response = await fetch(songData.audio);
          const blob = await response.blob();
          const newSong = { id: Date.now(), title: songData.title, audioBlob: blob, lyrics: songData.lyrics };
          await saveSongToDB(newSong);
          alert(songData.title + " വിജയകരമായി ചേർത്തു!");
          loadLibrary();
          playSavedSong(newSong.id);
        } catch(err) { alert("പാട്ട് ചേർക്കുന്നതിൽ പിഴവ് സംഭവിച്ചു."); }
      }
    });
    if (window.opener) { window.opener.postMessage('APP_READY', '*'); }
  });

  document.getElementById('saveApiBtn').addEventListener('click', () => {
    const key = document.getElementById('apiKey').value.trim();
    const model = document.getElementById('modelSelect').value;
    if(key) {
      localStorage.setItem('gemini_karaoke_key', key);
      localStorage.setItem('gemini_karaoke_model', model);
      document.getElementById('apiSection').style.display = 'none';
      alert("സെറ്റിംഗ്സ് സേവ് ചെയ്തു!");
    }
  });

  document.getElementById('resetApiBtn').addEventListener('click', () => { document.getElementById('apiSection').style.display = 'block'; });

  document.getElementById('showAddViewBtn').addEventListener('click', () => { showView('addView'); });
  
  document.getElementById('backToLibraryBtn').addEventListener('click', async () => {
      await deleteSongFromDB('DRAFT');
      pendingFile = null;
      document.getElementById('songTitleInput').value = '';
      document.getElementById('mediaFile').value = '';
      document.getElementById('customLyrics').value = '';
      document.getElementById('draftFileInfo').style.display = 'none';
      loadLibrary();
      showView('libraryView');
  });
  
  document.getElementById('playerBackBtn').addEventListener('click', () => {
    if (document.fullscreenElement) { document.exitFullscreen(); }
    document.getElementById('audioPlayer').pause();
    showView('libraryView');
  });

  async function loadLibrary() {
    const songs = await getAllSongsFromDB();
    const list = document.getElementById('savedSongsList');
    list.innerHTML = '';
    const actualSongs = songs.filter(s => s.id !== 'DRAFT');

    if(actualSongs.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#94A3B8; font-size:14px;">ഇതുവരെ പാട്ടുകൾ സേവ് ചെയ്തിട്ടില്ല.</p>';
      return;
    }

    actualSongs.reverse().forEach(song => {
      const li = document.createElement('li');
      li.className = 'song-item';
      li.innerHTML = `
        <span class="song-title">${song.title}</span>
        <div class="song-actions">
          <button onclick="playSavedSong(${song.id})" style="background:#10B981; color:#fff;">Play</button>
          <button onclick="exportSong(${song.id})" style="background:#3B82F6; color:#fff;">Share</button>
          <button onclick="deleteSong(${song.id})" style="background:#EF4444; color:#fff;">Del</button>
        </div>
      `;
      list.appendChild(li);
    });
  }

  window.exportSong = async (id) => {
    const song = await getSongFromDB(id);
    if(!song) return alert('പാട്ട് കണ്ടെത്താനായില്ല.');

    alert('പാട്ട് ഷെയർ ചെയ്യാനുള്ള ഫയൽ തയ്യാറാക്കുന്നു... അല്പം കാത്തിരിക്കുക.');

    const reader = new FileReader();
    reader.readAsDataURL(song.audioBlob);
    reader.onloadend = () => {
      const base64Audio = reader.result;
      const songDataStr = JSON.stringify({ title: song.title, lyrics: song.lyrics, audio: base64Audio });
      
      const htmlContent = `<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${song.title} - Sing Along</title>
  <style>
    body { background: #0F172A; color: #F8FAFC; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
    .card { background: #1E293B; padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }
    h1 { color: #38BDF8; font-size: 24px; margin-bottom: 10px; }
    p { color: #94A3B8; font-size: 14px; margin-bottom: 24px; }
    button { background: #38BDF8; color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 10px; padding: 15px 20px; cursor: pointer; width: 100%; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    .loading { display: none; color: #10B981; margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 ${song.title}</h1>
    <p>നിങ്ങൾക്ക് ഒരു പുതിയ കരോക്കെ പാട്ട് ലഭിച്ചിട്ടുണ്ട്!</p>
    <button id="openAppBtn">Play in Sing-Along App</button>
    <div id="status" class="loading">App തുറക്കുന്നു... ദയവായി കാത്തിരിക്കുക!</div>
  </div>
  <script>
    const songData = ${songDataStr};
    document.getElementById("openAppBtn").addEventListener("click", () => {
      document.getElementById("status").style.display = "block";
      const appWindow = window.open("https://muralipaladan.github.io/Sing-Along/", "SingAlongApp");
      window.addEventListener("message", (e) => {
        if(e.origin === "https://muralipaladan.github.io" && e.data === "APP_READY") {
           appWindow.postMessage({ type: "IMPORT_SONG", data: songData }, "https://muralipaladan.github.io");
           document.getElementById("status").innerText = "പാട്ട് വിജയകരമായി ആപ്പിലേക്ക് അയച്ചു!";
           document.getElementById("status").style.color = "#38BDF8";
        }
      });
      setTimeout(() => { appWindow.postMessage({ type: "IMPORT_SONG", data: songData }, "https://muralipaladan.github.io"); }, 3500);
    });
  <\/script>
</body>
</html>`;
      
      const blob = new Blob([htmlContent], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = song.title.replace(/[^a-zA-Z0-9]/g, '_') + '_karaoke.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
  };

  let progressInterval;
  function updateProgress(percent, text) {
    document.getElementById('progressBox').style.display = 'block';
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressText').innerText = percent + '%';
    document.getElementById('progressStatus').innerText = text;
  }
  function simulateProgress(start, end, duration, text) {
    clearInterval(progressInterval);
    let p = start;
    const step = (end - start) / (duration / 100);
    progressInterval = setInterval(() => {
      p += step;
      if(p >= end) { p = end; clearInterval(progressInterval); }
      updateProgress(Math.floor(p), text);
    }, 100);
  }

  document.getElementById('processBtn').addEventListener('click', async () => {
    const file = pendingFile || document.getElementById('mediaFile').files[0];
    const title = document.getElementById('songTitleInput').value.trim() || (file ? (file.name ? file.name.replace(/\.[^/.]+$/, "") : 'My Song') : 'My Song');
    let customLyricsText = document.getElementById('customLyrics').value.trim();

    const apiKey = localStorage.getItem('gemini_karaoke_key');
    const selectedModel = localStorage.getItem('gemini_karaoke_model') || 'gemini-3.5-flash';
    
    if(!apiKey) {
        alert('ടൈംലൈൻ തയ്യാറാക്കാൻ API Key ആവശ്യമാണ്! ദയവായി സേവ് ചെയ്യുക.');
        document.getElementById('apiSection').style.display = 'block';
        showView('libraryView');
        return;
    }
    if(!file) return alert('ഒരു ഓഡിയോ/വീഡിയോ ഫയൽ തിരഞ്ഞെടുക്കുക!');

    document.getElementById('processBtn').disabled = true;
    document.getElementById('progressBox').style.display = 'block';
    
    try {
      simulateProgress(0, 40, 3000, 'ഫയൽ കംപ്രസ് ചെയ്യുന്നു (Local Processing)...');
      const base64Audio = await compressAudioFile(file);
      
      simulateProgress(40, 95, 12000, 'AI പാട്ടും വരികളും മാച്ച് ചെയ്യുന്നു (കുറച്ചു സമയമെടുക്കും)...');
      const jsonTimeline = await fetchTimelineFromGemini(apiKey, selectedModel, base64Audio, customLyricsText);

      clearInterval(progressInterval);
      updateProgress(100, 'പൂർത്തിയായി!');

      if(!jsonTimeline || jsonTimeline.length === 0) throw new Error('വരികൾ മാച്ച് ചെയ്യാൻ കഴിഞ്ഞില്ല.');

      const songData = { id: Date.now(), title: title, audioBlob: file, lyrics: jsonTimeline };
      await saveSongToDB(songData);
      
      await deleteSongFromDB('DRAFT');
      pendingFile = null;
      
      alert('പാട്ട് വിജയകരമായി ചേർത്തു!');
      document.getElementById('songTitleInput').value = '';
      document.getElementById('mediaFile').value = '';
      document.getElementById('customLyrics').value = '';
      document.getElementById('draftFileInfo').style.display = 'none';
      document.getElementById('progressBox').style.display = 'none';
      
      loadLibrary();
      showView('libraryView');

    } catch (error) {
      alert("പിഴവ്: " + error.message);
      clearInterval(progressInterval);
      document.getElementById('progressBox').style.display = 'none';
    } finally {
      document.getElementById('processBtn').disabled = false;
    }
  });

  let currentLyrics = [];
  let currentActiveLineIndex = -1;

  window.playSavedSong = async (id) => {
    const song = await getSongFromDB(id);
    if(!song) return alert('പാട്ട് കണ്ടെത്താനായില്ല.');

    currentLyrics = Array.isArray(song.lyrics) ? song.lyrics : [];
    currentActiveLineIndex = -1; 
    document.getElementById('playerTitle').innerText = song.title;
    
    const audioUrl = URL.createObjectURL(song.audioBlob);
    const audio = document.getElementById('audioPlayer');
    audio.src = audioUrl;

    renderLineLyrics();
    showView('playerView');
  };

  function renderLineLyrics() {
    const box = document.getElementById('lyricsBox');
    box.innerHTML = '';
    
    if(currentLyrics.length === 0) {
      box.innerHTML = '<p style="color:#94A3B8;">വരികൾ ലഭ്യമല്ല.</p>';
      return;
    }

    currentLyrics.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'lyric-line';
      div.id = 'line-' + index;
      div.innerText = item.line;
      box.appendChild(div);
    });
    
    // താഴെ സ്ക്രോൾ ചെയ്യാനുള്ള സ്പേസ്
    const paddingDiv = document.createElement('div');
    paddingDiv.style.height = "150px";
    box.appendChild(paddingDiv);
  }

  document.getElementById('audioPlayer').addEventListener('timeupdate', () => {
    if (!currentLyrics.length) return;
    const currentTime = document.getElementById('audioPlayer').currentTime;
    
    let activeIndex = -1;
    for (let i = 0; i < currentLyrics.length; i++) {
      if (currentTime >= currentLyrics[i].time) {
        activeIndex = i;
      } else { break; }
    }

    if (activeIndex !== currentActiveLineIndex && activeIndex !== -1) {
      const lines = document.querySelectorAll('.lyric-line');
      lines.forEach((el, i) => {
        el.classList.remove('active', 'passed');
        if (i < activeIndex) el.classList.add('passed');
        if (i === activeIndex) {
          el.classList.add('active');
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
      currentActiveLineIndex = activeIndex;
    }
  });

  async function compressAudioFile(file) {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    const targetSampleRate = 8000; 
    const offlineContext = new OfflineAudioContext(1, audioBuffer.duration * targetSampleRate, targetSampleRate);
    const source = offlineContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offlineContext.destination);
    source.start();
    const renderedBuffer = await offlineContext.startRendering();
    const wavBlob = bufferToWav(renderedBuffer);
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(wavBlob);
    });
  }

  function bufferToWav(abuffer) {
    let numOfChan = abuffer.numberOfChannels, length = abuffer.length * numOfChan * 2 + 44,
        buffer = new ArrayBuffer(length), view = new DataView(buffer), channels = [], i, sample, offset = 0, pos = 0;
    function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
    function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
    setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
    setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(abuffer.sampleRate);
    setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
    setUint32(0x61746164); setUint32(length - pos - 4);
    for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
    while(pos < length) {
      for(i = 0; i < numOfChan; i++) {
        sample = Math.max(-1, Math.min(1, channels[i][offset]));
        sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
        view.setInt16(pos, sample, true); pos += 2;
      } offset++;
    }
    return new Blob([buffer], {type: "audio/wav"});
  }

  async function fetchTimelineFromGemini(apiKey, selectedModel, base64Audio, customLyrics) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;
    
    let promptText = "";
    if (customLyrics) {
        promptText = `Listen to the audio. I have provided the lyrics below. Synchronize each line of the lyrics with the audio. 
        OUTPUT REQUIREMENT: Return ONLY a valid JSON array of objects. 
        Format: [{"line": "first line text", "time": start_time_in_seconds_as_number}, {"line": "second line text", "time": 10.5}]. 
        DO NOT output any markdown, HTML, or extra text. ONLY raw JSON.
        Lyrics to sync:\n${customLyrics}`;
    } else {
        promptText = `Listen to the audio. Transcribe the Malayalam lyrics line-by-line and synchronize them with timestamps.
        OUTPUT REQUIREMENT: Return ONLY a valid JSON array of objects. 
        Format: [{"line": "first line text", "time": start_time_in_seconds_as_number}, {"line": "second line text", "time": 10.5}]. 
        DO NOT output any markdown, HTML, or extra text. ONLY raw JSON.`;
    }

    const payload = { contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "audio/wav", data: base64Audio } }] }] };
    const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    
    if (!response.ok) { 
        const errorText = await response.text();
        throw new Error("API Error: " + response.status); 
    }
    
    const data = await response.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    text = text.replace(/```json/g, '').replace(/```/g, '').trim();
    
    try {
      const jsonArr = JSON.parse(text);
      if(!Array.isArray(jsonArr)) throw new Error("Not an array");
      return jsonArr;
    } catch (e) {
      throw new Error("AI കൃത്യമായ ടൈംലൈൻ നൽകിയില്ല. ദയവായി വീണ്ടും ശ്രമിക്കുക.");
    }
  }
</script>
