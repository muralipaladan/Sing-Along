<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karaoke Lyrics AI</title>
<style>
  :root {
    --bg: #121212;
    --surface: #1E1E1E;
    --primary: #FFB74D;
    --text: #E0E0E0;
    --text-muted: #9E9E9E;
    --radius: 12px;
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 500px;
  }
  .card {
    background: var(--surface);
    padding: 20px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  h1 {
    font-size: 20px;
    color: var(--primary);
    text-align: center;
    margin-top: 0;
  }
  input[type="password"], input[type="file"] {
    width: 100%;
    padding: 12px;
    background: #2C2C2C;
    border: 1px solid #444;
    color: white;
    border-radius: 8px;
    margin-top: 8px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #000;
    font-weight: bold;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    margin-top: 16px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  button:active { transform: scale(0.98); }
  button:disabled { background: #555; color: #888; cursor: not-allowed; }
  
  .status {
    font-size: 13px;
    color: var(--primary);
    text-align: center;
    margin-top: 12px;
    min-height: 18px;
  }

  /* Audio Player */
  audio {
    width: 100%;
    margin-top: 16px;
    border-radius: 8px;
  }

  /* Karaoke Box */
  .karaoke-container {
    background: #000;
    height: 350px;
    overflow-y: auto;
    border-radius: var(--radius);
    padding: 20px 10px;
    text-align: center;
    position: relative;
    scroll-behavior: smooth;
    border: 1px solid #333;
  }
  .lyric-line {
    font-size: 18px;
    color: var(--text-muted);
    margin: 12px 0;
    transition: all 0.3s ease;
    opacity: 0.6;
  }
  .lyric-line.active {
    color: var(--primary);
    font-size: 24px;
    font-weight: bold;
    opacity: 1;
    transform: scale(1.05);
  }
  .lyric-line.passed {
    color: #555;
  }
</style>
</head>
<body>

<div class="container">
  <!-- Step 1: Settings & File Upload -->
  <div class="card" id="uploadCard">
    <h1>🎶 വരികൾ കണ്ടെത്താം</h1>
    <label style="font-size: 14px; color: var(--text-muted);">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIzaSy...">
    
    <label style="font-size: 14px; color: var(--text-muted); display: block; margin-top: 16px;">MP3 അല്ലെങ്കിൽ MP4 ഫയൽ തിരഞ്ഞെടുക്കുക</label>
    <input type="file" id="mediaFile" accept="audio/*, video/mp4">
    
    <button id="processBtn">വരികൾ തയ്യാറാക്കുക</button>
    <div class="status" id="statusText"></div>
  </div>

  <!-- Step 2: Player & Karaoke Box -->
  <div class="card" id="playerCard" style="display: none;">
    <h2 style="font-size: 16px; text-align: center; margin: 0 0 10px 0;">പ്ലേ ചെയ്യുക</h2>
    <audio id="audioPlayer" controls></audio>
    <div class="status" style="margin: 5px 0 15px 0; color: #888; font-size: 12px;">AI വരികൾക്ക് ചിലപ്പോൾ ചെറിയ സമയ വ്യത്യാസം ഉണ്ടാകാം.</div>
    
    <div class="karaoke-container" id="lyricsBox">
      <div class="lyric-line">വരികൾ ഇവിടെ വരും...</div>
    </div>
  </div>
</div>

<script>
  let parsedLyrics = [];
  const statusText = document.getElementById('statusText');
  const processBtn = document.getElementById('processBtn');
  const audioPlayer = document.getElementById('audioPlayer');
  const lyricsBox = document.getElementById('lyricsBox');
  const uploadCard = document.getElementById('uploadCard');
  const playerCard = document.getElementById('playerCard');

  // Local Storage for API Key
  const savedKey = localStorage.getItem('gemini_karaoke_key');
  if(savedKey) document.getElementById('apiKey').value = savedKey;

  processBtn.addEventListener('click', async () => {
    const apiKey = document.getElementById('apiKey').value.trim();
    const file = document.getElementById('mediaFile').files[0];

    if (!apiKey) {
      statusText.textContent = "API Key നൽകുക!";
      return;
    }
    if (!file) {
      statusText.textContent = "ഒരു ഫയൽ തിരഞ്ഞെടുക്കുക!";
      return;
    }

    localStorage.setItem('gemini_karaoke_key', apiKey);
    processBtn.disabled = true;
    
    try {
      // 1. Load file into Audio Player for full quality playback
      const fileUrl = URL.createObjectURL(file);
      audioPlayer.src = fileUrl;

      // 2. Compress audio to small WAV (16kHz Mono) for API upload
      statusText.textContent = "ഫയൽ സൈസ് കുറയ്ക്കുന്നു (Compressing)...";
      const base64Audio = await compressAudioFile(file);

      // 3. Send to Gemini API
      statusText.textContent = "AI വരികൾ എഴുതുകയാണ്, ദയവായി കാത്തിരിക്കുക...";
      const lrcData = await fetchLyricsFromGemini(apiKey, base64Audio);

      // 4. Parse LRC and start Karaoke
      parsedLyrics = parseLRC(lrcData);
      
      if(parsedLyrics.length === 0) {
        throw new Error("AI കൃത്യമായ സമയക്രമം (LRC) നൽകിയില്ല.");
      }

      uploadCard.style.display = 'none';
      playerCard.style.display = 'block';
      renderLyrics();

    } catch (error) {
      statusText.textContent = "പിഴവ്: " + error.message;
      console.error(error);
    } finally {
      processBtn.disabled = false;
    }
  });

  // --- Audio Compression Logic (Downsample to 16000Hz Mono WAV) ---
  async function compressAudioFile(file) {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    
    // Create Offline Context at 16000Hz, Mono
    const targetSampleRate = 16000;
    const offlineContext = new OfflineAudioContext(1, audioBuffer.duration * targetSampleRate, targetSampleRate);
    const source = offlineContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offlineContext.destination);
    source.start();

    const renderedBuffer = await offlineContext.startRendering();
    const wavBlob = bufferToWav(renderedBuffer);
    
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        resolve(reader.result.split(',')[1]); // Return Base64
      };
      reader.readAsDataURL(wavBlob);
    });
  }

  // Helper: Convert AudioBuffer to WAV format
  function bufferToWav(abuffer) {
    let numOfChan = abuffer.numberOfChannels,
        length = abuffer.length * numOfChan * 2 + 44,
        buffer = new ArrayBuffer(length),
        view = new DataView(buffer),
        channels = [], i, sample,
        offset = 0,
        pos = 0;

    // write WAV header
    setUint32(0x46464952); // "RIFF"
    setUint32(length - 8); // file length - 8
    setUint32(0x45564157); // "WAVE"
    setUint32(0x20746d66); // "fmt " chunk
    setUint32(16); // length = 16
    setUint16(1); // PCM (uncompressed)
    setUint16(numOfChan);
    setUint32(abuffer.sampleRate);
    setUint32(abuffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
    setUint16(numOfChan * 2); // block-align
    setUint16(16); // 16-bit
    setUint32(0x61746164); // "data" - chunk
    setUint32(length - pos - 4); // chunk length

    for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
    while(pos < length) {
      for(i = 0; i < numOfChan; i++) {
        sample = Math.max(-1, Math.min(1, channels[i][offset])); // clamp
        sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0; // float to 16-bit
        view.setInt16(pos, sample, true); // write 16-bit
        pos += 2;
      }
      offset++
    }
    return new Blob([buffer], {type: "audio/wav"});

    function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
    function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
  }

  // --- Gemini API Call ---
  async function fetchLyricsFromGemini(apiKey, base64Audio) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    const prompt = `Listen to the attached audio file. Transcribe the lyrics exactly as sung. Output the result STRICTLY in LRC file format with timestamps (e.g. [00:15.20] Lyric line). If it is a Malayalam song, write the lyrics in Malayalam script. Do not write any introduction, notes, or extra text. ONLY return the LRC content.`;

    const payload = {
      contents: [{
        parts: [
          { text: prompt },
          { inlineData: { mimeType: "audio/wav", data: base64Audio } }
        ]
      }]
    };

    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!response.ok) throw new Error("API Error: " + response.status);
    
    const data = await response.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  }

  // --- LRC Parsing ---
  function parseLRC(lrcText) {
    const lines = lrcText.split('\n');
    const result = [];
    const timeRegex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;

    lines.forEach(line => {
      const match = line.match(timeRegex);
      if (match) {
        const minutes = parseInt(match[1], 10);
        const seconds = parseFloat(match[2]);
        const text = match[3].trim();
        if (text) {
          result.push({ time: (minutes * 60) + seconds, text: text });
        }
      }
    });
    return result;
  }

  // --- Karaoke Rendering & Sync ---
  function renderLyrics() {
    lyricsBox.innerHTML = '';
    parsedLyrics.forEach((line, index) => {
      const p = document.createElement('p');
      p.className = 'lyric-line';
      p.textContent = line.text;
      p.id = 'line-' + index;
      lyricsBox.appendChild(p);
    });
  }

  audioPlayer.addEventListener('timeupdate', () => {
    if (!parsedLyrics.length) return;
    
    const currentTime = audioPlayer.currentTime;
    let activeIndex = -1;

    // Find current line based on time
    for (let i = 0; i < parsedLyrics.length; i++) {
      if (currentTime >= parsedLyrics[i].time) {
        activeIndex = i;
      } else {
        break;
      }
    }

    // Update UI
    const allLines = document.querySelectorAll('.lyric-line');
    allLines.forEach((el, i) => {
      el.classList.remove('active', 'passed');
      if (i < activeIndex) el.classList.add('passed');
      if (i === activeIndex) {
        el.classList.add('active');
        // Auto-scroll logic
        const scrollAmount = el.offsetTop - (lyricsBox.offsetHeight / 2) + (el.offsetHeight / 2);
        lyricsBox.scrollTop = scrollAmount;
      }
    });
  });

</script>
</body>
</html>
